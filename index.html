        /* --- CSS VARIABLES & THEME --- */
        :root {

            --secondary: #ec4899;

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-ui);
            background: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        a { text-decoration: none; color: inherit; transition: 0.2s; }
        button, input, select { font-family: inherit; }

        /* --- LAYOUT --- */
        .app-container {
            max-width: 1400px;

            padding: 2rem;
            width: 100%;
            flex: 1;

        .header-main {

        .app-grid {

        /* --- COMPONENTS --- */

        /* --- FOOTER --- */
        .app-footer {

    <script>
        /**************************************************************
         * CORE SUDOKU LOGIC & APP CONTROLLER
         **************************************************************/
        
        // --- CONSTANTS & STATE ---
        const CONSTANTS = {
            PAPER_SIZES: {
                A4: [595.28, 841.89],
                LETTER: [612, 792],
                LEGAL: [612, 1008],
                TABLOID: [792, 1224]
            }
        };

        const state = {
            puzzles: [],
            difficulty: 'easy',
            generating: false
        };

        // --- UTILS ---
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const nextFrame = () => new Promise(r => requestAnimationFrame(r));
        
        function showToast(msg) {
            const t = $('#toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- SUDOKU SOLVER & GENERATOR ---
        class SudokuEngine {
            constructor(seedStr) {
                // Mulberry32 Seeded RNG
                this.seed = this.hash(seedStr || Date.now().toString());
            }

            hash(str) {
                let h = 1779033703 ^ str.length;
                for(let i=0; i<str.length; i++) {
                    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
                    h = h << 13 | h >>> 19;
                }
                return () => {
                    h = Math.imul(h ^ h >>> 16, 2246822507);
                    h = Math.imul(h ^ h >>> 13, 3266489909);
                    return (h >>> 0) / 4294967296;
                }
            }

            generate(difficulty, symmetry) {
                const rng = this.seed; // Getting the function
                
                // 1. Generate Complete Board (Backtracking)
                const board = new Uint8Array(81);
                
                const isValid = (grid, idx, num) => {
                    const r = Math.floor(idx/9), c = idx%9;
                    const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
                    for(let i=0; i<9; i++) if(grid[r*9 + i] === num || grid[i*9 + c] === num) return false;
                    for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(grid[(br+i)*9 + bc+j] === num) return false;
                    return true;
                };

                const fill = (grid, idx=0) => {
                    if(idx >= 81) return true;
                    
                    // Randomized candidates
                    const nums = [1,2,3,4,5,6,7,8,9];
                    // Fisher-Yates inside
                    for(let i=nums.length-1; i>0; i--) {
                        const j = Math.floor(rng() * (i+1));
                        [nums[i], nums[j]] = [nums[j], nums[i]];
                    }

                    for(const n of nums) {
                        if(isValid(grid, idx, n)) {
                            grid[idx] = n;
                            if(fill(grid, idx+1)) return true;
                            grid[idx] = 0;
                        }
                    }
                    return false;
                };

                fill(board);
                const solution = new Uint8Array(board);

                // 2. Remove Digits (Create Puzzle)
                const puzzle = new Uint8Array(board);
                
                let attempts = difficulty === 'expert' ? 58 : 
                               difficulty === 'hard' ? 50 : 
                               difficulty === 'medium' ? 40 : 30;
                
                // Shuffle indices
                const indices = Array.from({length:81}, (_,i)=>i);
                for(let i=80; i>0; i--) {
                    const j = Math.floor(rng() * (i+1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }

                for(const idx of indices) {
                    if(puzzle[idx] === 0) continue;
                    
                    let pairIdx = -1;
                    if(symmetry) {
                        const r = Math.floor(idx/9), c = idx%9;
                        pairIdx = (8-r)*9 + (8-c); // Rotational
                    }

                    const backup1 = puzzle[idx];
                    const backup2 = (pairIdx !== -1) ? puzzle[pairIdx] : 0;

                    puzzle[idx] = 0;
                    if(pairIdx !== -1) puzzle[pairIdx] = 0;
                    
                    // Note: A true solver would check for unique solutions here.
                    // For client-side speed in JS, we use a heuristic based on attempts.
                    
                    attempts--;
                    if(attempts <= 0) break;
                }

                return { puzzle, solution };
            }
        }

        // --- PDF BUILDER ---
        async function buildPDF(puzzles, config) {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const doc = await PDFDocument.create();
            doc.setTitle(`Sudoku Workbook - ${config.difficulty}`);
            doc.setAuthor("Sudoku Studio Pro");
            doc.setCreator("Sudoku Studio Pro");

            // Embed fonts
            const fontBold = await doc.embedFont(StandardFonts.HelveticaBold);
            const fontReg = await doc.embedFont(StandardFonts.Helvetica);

            const paperDim = CONSTANTS.PAPER_SIZES[config.paper];
            const [pageW, pageH] = paperDim;
            const margin = 40; // points
            
            const perPage = parseInt(config.perPage);
            
            // Layout Calculation
            let cols, rows;
            if(perPage === 1) { cols=1; rows=1; }
            else if(perPage === 2) { cols=1; rows=2; }
            else if(perPage === 4) { cols=2; rows=2; }
            else if(perPage === 6) { cols=2; rows=3; }
            else { cols=3; rows=3; } // 9

            const contentW = pageW - (margin * 2);
            // Reserve header space if enabled
            const headerH = config.header ? 60 : 20; 
            const footerH = 30;
            const contentH = pageH - (margin * 2) - headerH - footerH;

            const gap = 20;
            const cellW = (contentW - (gap * (cols - 1))) / cols;
            const cellH = (contentH - (gap * (rows - 1))) / rows;
            const gridSize = Math.min(cellW, cellH); // Keep it square

            // Function to draw a single grid
            const drawGrid = (page, x, y, size, data, isSolution, label) => {
                const cellS = size / 9;
                
                // Draw Label
                page.drawText(label, {
                    x: x, y: y + size + 6,
                    size: 9, font: fontBold, color: rgb(0.2,0.2,0.2)
                });

                // Draw Border
                page.drawRect({
                    x, y, width: size, height: size,
                    borderColor: rgb(0,0,0), borderWidth: 1.5
                });

                // Draw Lines
                for(let i=1; i<9; i++) {
                    const thick = (i % 3 === 0) ? 1.5 : 0.5;
                    // Vert
                    page.drawLine({
                        start: { x: x + i*cellS, y: y },
                        end: { x: x + i*cellS, y: y+size },
                        thickness: thick, color: rgb(0,0,0)
                    });
                    // Horiz
                    page.drawLine({
                        start: { x: x, y: y + i*cellS },
                        end: { x: x + size, y: y + i*cellS },
                        thickness: thick, color: rgb(0,0,0)
                    });
                }

                // Draw Numbers
                for(let r=0; r<9; r++) {
                    for(let c=0; c<9; c++) {
                        // PDF coords are bottom-left origin. Array is top-left.
                        // r=0 in array is top row. r=0 in PDF logic needs to be top.
                        // Actually easier to map: y + size - (r+1)*cellS
                        const val = data[r*9 + c];
                        if(val !== 0) {
                            const txt = val.toString();
                            const width = fontBold.widthOfTextAtSize(txt, cellS*0.6);
                            const height = fontBold.heightAtSize(cellS*0.6);
                            
                            page.drawText(txt, {
                                x: x + c*cellS + (cellS-width)/2,
                                y: y + size - (r+1)*cellS + (cellS-height)/2 + 2, // +2 for visual center
                                size: cellS*0.6,
                                font: isSolution ? fontReg : fontBold,
                                color: isSolution ? rgb(0.4,0.4,0.4) : rgb(0,0,0)
                            });
                        }
                    }
                }
            };

            const drawPageSet = (dataSet, isSolSet) => {
                const pageCount = Math.ceil(dataSet.length / perPage);
                
                for(let p=0; p<pageCount; p++) {
                    const page = doc.addPage([pageW, pageH]);
                    const startIndex = p * perPage;
                    const pageItems = dataSet.slice(startIndex, startIndex + perPage);

                    // Header
                    if(config.header) {
                        const title = isSolSet ? "Answer Key" : "Sudoku Worksheet";
                        page.drawText(title, { x: margin, y: pageH - margin - 15, size: 16, font: fontBold });
                        
                        if(!isSolSet) {
                            page.drawText(`Difficulty: ${config.difficulty.toUpperCase()}`, { x: margin, y: pageH - margin - 35, size: 10, font: fontReg, color: rgb(0.5,0.5,0.5) });
                            // Name Line
                            page.drawText("Name: ______________________   Date: ____________", { 
                                x: pageW - margin - 250, 
                                y: pageH - margin - 15, 
                                size: 10, font: fontReg 
                            });
                        }
                    }

                    // Grids
                    pageItems.forEach((item, i) => {
                        const col = i % cols;
                        const row = Math.floor(i / cols);
                        
                        // Calculate position (Top-Left origin logic for grid system)
                        const x = margin + col * (gridSize + gap) + (contentW - (cols*gridSize + (cols-1)*gap))/2; 
                        // Y is tricky because PDF is bottom-up.
                        const startY = pageH - margin - headerH;
                        const y = startY - (row + 1) * gridSize - (row * gap);

                        const puzzleIdx = startIndex + i + 1;
                        drawGrid(page, x, y, gridSize, item, isSolSet, `${isSolSet ? 'Ans' : 'Puz'} #${puzzleIdx}`);
                    });

                    // Footer
                    const footerText = `Sudoku Studio Pro - Page ${p+1} ${isSolSet?'(Answers)':''}`;
                    const fWidth = fontReg.widthOfTextAtSize(footerText, 8);
                    page.drawText(footerText, {
                        x: (pageW - fWidth)/2,
                        y: margin - 10,
                        size: 8, font: fontReg, color: rgb(0.6,0.6,0.6)
                    });
                }
            };

            // 1. Draw Puzzles
            drawPageSet(puzzles.map(p => p.puzzle), false);

            // 2. Draw Answers (if requested)
            if(config.answerKey) {
                drawPageSet(puzzles.map(p => p.solution), true);
            }

            return await doc.save();
        }

        // --- DOM INTERACTIONS ---
        document.addEventListener('DOMContentLoaded', () => {
            $('#year').textContent = new Date().getFullYear();

            // Difficulty Select
            $$('.seg-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    $$('.seg-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.difficulty = btn.dataset.diff;
                });
            });

            // Preview Toggle
            $('#previewSol').addEventListener('change', (e) => {
                document.body.classList.toggle('show-solutions', e.target.checked);
                renderPreview(); // Re-render to apply classes if needed
            });

            // Generate Button
            $('#generateBtn').addEventListener('click', async () => {
                if(state.generating) return;
                state.generating = true;
                
                const btn = $('#generateBtn');
                const prevHTML = btn.innerHTML;
                btn.innerHTML = `<div class="spinner"></div> Generating...`;
                btn.disabled = true;
                $('#downloadBtn').disabled = true;

                // Inputs
                const count = Math.min(Math.max(parseInt($('#count').value)||12, 1), 200);
                const seed = $('#seed').value || null;
                const symmetry = $('#symmetry').checked;

                // Engine
                const engine = new SudokuEngine(seed);
                state.puzzles = [];

                // Async Loop
                for(let i=0; i<count; i++) {
                    state.puzzles.push(engine.generate(state.difficulty, symmetry));
                    if(i % 5 === 0) await nextFrame(); // Keep UI responsive
                }

                // Finish
                renderPreview();
                btn.innerHTML = prevHTML;
                btn.disabled = false;
                $('#downloadBtn').disabled = false;
                $('#status').textContent = `${count} Puzzles Generated`;
                showToast(`Successfully generated ${count} puzzles`);
                state.generating = false;
            });

            // Download Button
            $('#downloadBtn').addEventListener('click', async () => {
                const btn = $('#downloadBtn');
                const prevHTML = btn.innerHTML;
                btn.innerHTML = `<div class="spinner"></div> Building PDF...`;
                btn.disabled = true;

                try {
                    const config = {
                        difficulty: state.difficulty,
                        paper: $('#paper').value,
                        perPage: $('#perPage').value,
                        header: $('#pageHeader').checked,
                        answerKey: $('#answerKey').checked
                    };

                    // Yield to render spinner
                    await sleep(50);
                    
                    const pdfBytes = await buildPDF(state.puzzles, config);
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Sudoku_Set_${config.difficulty}_${Date.now()}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    showToast('PDF Downloaded!');
                } catch(e) {
                    console.error(e);
                    alert('Error creating PDF');
                } finally {
                    btn.innerHTML = prevHTML;
                    btn.disabled = false;
                }
            });

            // Share Button
            $('#shareBtn').addEventListener('click', async () => {
                if(navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Sudoku Studio Pro',
                            text: 'Check out this free vector Sudoku generator!',
                            url: window.location.href
                        });
                    } catch(err) { /* User cancelled */ }
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    showToast('Link copied to clipboard');
                }
            });
        });

        // --- RENDERER ---
        function renderPreview() {
            const container = $('#previewGrid');
            container.innerHTML = '';
            
            const showSol = $('#previewSol').checked;
            // Limit preview to 12 items max to save DOM memory
            const slice = state.puzzles.slice(0, 12);

            slice.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'sudoku-preview-card';
                
                let gridHTML = '';
                for(let i=0; i<81; i++) {
                    const val = p.puzzle[i];
                    const sol = p.solution[i];
                    // If val is 0, it's empty. If showSol is true, show solution in blue.
                    const content = val !== 0 ? val : (showSol ? sol : '');
                    const classes = `cell ${val !== 0 ? 'given' : (showSol ? 'solved' : '')}`;
                    gridHTML += `<div class="${classes}">${content}</div>`;
                }

                card.innerHTML = `
                    <div class="preview-meta">
                        <span>#${idx+1}</span>
                        <span>${state.difficulty.toUpperCase()}</span>
                    </div>
                    <div class="sudoku-grid">
                        ${gridHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
