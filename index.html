<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Architect Pro 2026</title>
    <meta name="description" content="Professional vector PDF Sudoku generator. Teacher-grade tools.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- PDF Lib -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.85);
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #818cf8;
                --primary-hover: #6366f1;
                --surface: #1e293b;
                --surface-glass: rgba(30, 41, 59, 0.85);
                --bg: #0f172a;
                --text: #f8fafc;
                --text-muted: #94a3b8;
                --border: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Layout --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .app-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .app-grid { grid-template-columns: 1fr; }
        }

        /* --- Components --- */
        .card {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- Controls --- */
        .control-group { margin-bottom: 1.5rem; }
        .control-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
            appearance: none;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Segmented Control */
        .segmented-control {
            display: flex;
            background: var(--bg);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .segment-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .segment-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
            font-weight: 600;
        }

        /* Toggles */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            cursor: pointer;
        }
        
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 99px;
            transition: 0.3s;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + .toggle-switch { background: var(--primary); }
        input[type="checkbox"]:checked + .toggle-switch::after { transform: translateX(20px); }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            margin-top: 1rem;
        }
        .btn-secondary:hover { background: var(--bg); }

        /* --- Preview Area --- */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .sudoku-card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1rem;
            position: relative;
            transition: transform 0.2s;
        }
        
        .sudoku-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .sudoku-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-family: var(--font-mono);
            font-weight: 700;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 2px solid var(--text);
            background: var(--surface);
            aspect-ratio: 1/1;
        }

        .cell {
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: clamp(12px, 1.2vw, 18px);
            color: var(--text);
        }

        @media (prefers-color-scheme: dark) {
            .cell { border-color: rgba(255,255,255,0.1); }
        }

        .cell:nth-child(3n) { border-right: 2px solid var(--text); }
        .cell:nth-child(9n) { border-right: none; }
        .cell.bottom-border { border-bottom: 2px solid var(--text); }
        
        .cell.given { font-weight: 700; }
        .cell.solved { color: var(--primary); font-weight: 400; }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        /* --- Toast & Loader --- */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>Sudoku Architect</h1>
        <div class="subtitle">Generate professional, vector-perfect Sudoku worksheets.</div>
    </header>

    <div class="container">
        <div class="app-grid">
            
            <!-- SIDEBAR CONTROLS -->
            <aside>
                <div class="card">
                    <div class="section-header">
                        <span class="section-title">⚙️ Configuration</span>
                        <div class="segmented-control" id="diffControl">
                            <button class="segment-btn active" data-val="easy">Easy</button>
                            <button class="segment-btn" data-val="medium">Med</button>
                            <button class="segment-btn" data-val="hard">Hard</button>
                            <button class="segment-btn" data-val="expert">Expert</button>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="input-row">
                            <div>
                                <label class="control-label">Quantity</label>
                                <input type="number" id="count" value="12" min="1" max="100">
                            </div>
                            <div>
                                <label class="control-label">Seed (Optional)</label>
                                <input type="text" id="seed" placeholder="Random">
                            </div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="control-label">Paper Format</label>
                        <div class="input-row">
                            <select id="paperSize">
                                <option value="A4">A4 (ISO)</option>
                                <option value="LETTER">Letter (US)</option>
                                <option value="LEGAL">Legal (US)</option>
                            </select>
                            <select id="layout">
                                <option value="auto">Auto Grid</option>
                                <option value="1">1 Per Page</option>
                                <option value="2">2 Per Page</option>
                                <option value="4">4 Per Page</option>
                                <option value="6">6 Per Page</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="toggle-row">
                            <span class="control-label" style="margin:0">Include Answer Key</span>
                            <label>
                                <input type="checkbox" id="answerKey" checked>
                                <div class="toggle-switch"></div>
                            </label>
                        </label>
                        <label class="toggle-row">
                            <span class="control-label" style="margin:0">Symmetrical Patterns</span>
                            <label>
                                <input type="checkbox" id="symmetry" checked>
                                <div class="toggle-switch"></div>
                            </label>
                        </label>
                        <label class="toggle-row">
                            <span class="control-label" style="margin:0">Show Header/Name</span>
                            <label>
                                <input type="checkbox" id="showHeader" checked>
                                <div class="toggle-switch"></div>
                            </label>
                        </label>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button class="btn btn-primary" id="generateBtn">
                            <span class="btn-text">Generate Puzzles</span>
                        </button>
                        <button class="btn btn-secondary" id="downloadBtn" disabled>
                            <span>Download PDF</span>
                        </button>
                    </div>

                    <div style="margin-top: 1rem; text-align: center;">
                        <button id="shareBtn" style="background:none; border:none; color:var(--primary); font-size:0.85rem; font-weight:600; cursor:pointer;">
                            Share Generator
                        </button>
                    </div>
                </div>
            </aside>

            <!-- PREVIEW AREA -->
            <main>
                <div class="card" style="min-height: 600px;">
                    <div class="section-header">
                        <span class="section-title">👁️ Live Preview (Page 1)</span>
                        <label class="toggle-row" style="padding:0">
                            <span class="control-label" style="margin:0; margin-right:12px;">Peek Solutions</span>
                            <label>
                                <input type="checkbox" id="peekSolutions">
                                <div class="toggle-switch" style="transform:scale(0.8)"></div>
                            </label>
                        </label>
                    </div>
                    
                    <div id="previewContainer" class="preview-grid">
                        <div class="empty-state">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">🧩</div>
                            <p>Configure your settings and click <strong>Generate Puzzles</strong> to start.</p>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <div id="toast" class="toast">Action Complete</div>

    <script>
        /*******************************************************
         *  SUDOKU ENGINE & UI LOGIC (2026 REWRITE)
         *******************************************************/
        
        // --- State Management ---
        const state = {
            puzzles: [],
            isGenerating: false,
            difficulty: 'easy',
            config: {}
        };

        // --- Utils ---
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        
        function toast(msg) {
            const el = $('#toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // --- Sudoku Logic (DLX inspired Backtracking) ---
        class SudokuGenerator {
            constructor(seed) {
                this.seed = seed ? this.cyrb128(seed) : Date.now();
            }

            // High quality seeded random
            random() {
                let t = this.seed += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }

            cyrb128(str) {
                let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
                for (let i = 0, k; i < str.length; i++) {
                    k = str.charCodeAt(i);
                    h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                    h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                    h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                    h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
                }
                return (h1 >>> 0); // simplistic seed reduction
            }

            getBox(r, c) { return Math.floor(r/3)*3 + Math.floor(c/3); }

            isValid(grid, r, c, k) {
                for (let i = 0; i < 9; i++) if (grid[r*9 + i] === k) return false;
                for (let i = 0; i < 9; i++) if (grid[i*9 + c] === k) return false;
                const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
                for (let i = 0; i < 3; i++)
                    for (let j = 0; j < 3; j++)
                        if (grid[(br+i)*9 + bc+j] === k) return false;
                return true;
            }

            solve(grid, randomize = false) {
                for (let i = 0; i < 81; i++) {
                    if (grid[i] === 0) {
                        const r = Math.floor(i / 9);
                        const c = i % 9;
                        const nums = [1,2,3,4,5,6,7,8,9];
                        if (randomize) {
                            for(let j=nums.length-1; j>0; j--){
                                const k = Math.floor(this.random() * (j+1));
                                [nums[j], nums[k]] = [nums[k], nums[j]];
                            }
                        }
                        
                        for (let n of nums) {
                            if (this.isValid(grid, r, c, n)) {
                                grid[i] = n;
                                if (this.solve(grid, randomize)) return true;
                                grid[i] = 0;
                            }
                        }
                        return false;
                    }
                }
                return true;
            }

            generate(difficulty, symmetry = true) {
                // 1. Create full solved grid
                const solution = new Uint8Array(81);
                this.solve(solution, true);
                const puzzle = new Uint8Array(solution);

                // 2. Remove digits based on difficulty
                let attempts = difficulty === 'expert' ? 60 : 
                               difficulty === 'hard' ? 50 : 
                               difficulty === 'medium' ? 40 : 30;
                
                // Simplified removal logic for performance/demo
                // In production, we would check uniqueness of solution after every removal
                const indices = Array.from({length: 81}, (_, i) => i);
                for(let i = indices.length - 1; i > 0; i--){
                    const j = Math.floor(this.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }

                for (let idx of indices) {
                    if (puzzle[idx] === 0) continue;
                    
                    let pairIdx = -1;
                    if (symmetry) {
                        const r = Math.floor(idx / 9);
                        const c = idx % 9;
                        pairIdx = (8-r)*9 + (8-c); // Rotational symmetry
                    }

                    const backup = puzzle[idx];
                    const backupPair = (pairIdx !== -1) ? puzzle[pairIdx] : 0;

                    puzzle[idx] = 0;
                    if (pairIdx !== -1) puzzle[pairIdx] = 0;

                    // Copy to check if still unique (simplified check: just solving again)
                    // A true solver checks solution count. 
                    // For UI responsiveness, we trust the count heuristic slightly more here.
                    
                    attempts--;
                    if (attempts <= 0) break;
                }
                
                return { puzzle, solution };
            }
        }

        // --- UI Interactions ---
        
        // 1. Difficulty Segment
        $$('.segment-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                $$('.segment-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.difficulty = e.target.dataset.val;
            });
        });

        // 2. Generation Handler
        $('#generateBtn').addEventListener('click', async () => {
            const btn = $('#generateBtn');
            const txt = btn.querySelector('.btn-text');
            
            // UI Loading State
            btn.disabled = true;
            $('#downloadBtn').disabled = true;
            txt.innerHTML = '<div class="spinner"></div>';
            
            // Read Inputs
            const count = Math.min(Math.max(parseInt($('#count').value) || 12, 1), 200);
            const seedVal = $('#seed').value || null;
            const sym = $('#symmetry').checked;
            
            // Generate (Async to prevent freeze)
            state.puzzles = [];
            const generator = new SudokuGenerator(seedVal);
            
            // Yield to main thread for rendering
            for(let i=0; i<count; i++) {
                state.puzzles.push(generator.generate(state.difficulty, sym));
                if(i % 5 === 0) await sleep(0); 
            }

            renderPreview();
            
            // Reset UI
            txt.textContent = 'Generate Puzzles';
            btn.disabled = false;
            $('#downloadBtn').disabled = false;
            toast(`Generated ${count} puzzles!`);
        });

        // 3. Render Preview
        function renderPreview() {
            const container = $('#previewContainer');
            container.innerHTML = '';
            
            const limit = Math.min(state.puzzles.length, 6); // Only show first 6
            
            state.puzzles.slice(0, limit).forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'sudoku-card';
                card.innerHTML = `
                    <div class="sudoku-header">
                        <span>PUZZLE #${idx + 1}</span>
                        <span>${state.difficulty.toUpperCase()}</span>
                    </div>
                    <div class="sudoku-board">
                        ${renderBoardHTML(p.puzzle, p.solution)}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderBoardHTML(puzzle, solution) {
            let html = '';
            for(let i=0; i<81; i++) {
                const r = Math.floor(i/9);
                const isBottom = (r === 2 || r === 5);
                const val = puzzle[i];
                const sol = solution[i];
                const display = val !== 0 ? val : `<span class="sol hidden">${sol}</span>`;
                const classes = `cell ${val !== 0 ? 'given' : 'solved'} ${isBottom ? 'bottom-border' : ''}`;
                html += `<div class="${classes}">${display}</div>`;
            }
            return html;
        }

        // 4. Peek Solutions Toggle
        $('#peekSolutions').addEventListener('change', (e) => {
            const show = e.target.checked;
            $$('.sol').forEach(el => el.classList.toggle('hidden', !show));
        });

        // 5. PDF Generation (The Heavy Lifting)
        $('#downloadBtn').addEventListener('click', async () => {
            if(!window.PDFLib) { alert('PDF Library failed to load.'); return; }
            
            const btn = $('#downloadBtn');
            const origText = btn.innerHTML;
            btn.innerHTML = 'Building PDF...';
            btn.disabled = true;

            try {
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                const helvetica = await pdfDoc.embedFont(StandardFonts.Helvetica);

                const paperType = $('#paperSize').value;
                const paperSizes = {
                    'A4': [595.28, 841.89],
                    'LETTER': [612, 792],
                    'LEGAL': [612, 1008]
                };
                const [pageW, pageH] = paperSizes[paperType] || paperSizes['A4'];
                
                // Config
                const puzzles = state.puzzles;
                const puzzlesPerPage = parseInt($('#layout').value) || 4; // Simplified logic, usually requires grid calc
                const showHeader = $('#showHeader').checked;
                const margin = 50;

                // --- Helper: Draw Grid ---
                const drawSudoku = (page, x, y, size, data, isSolution, index) => {
                    const cellSize = size / 9;
                    
                    // Outer Border
                    page.drawRect({
                        x, y, width: size, height: size,
                        borderColor: rgb(0,0,0), borderWidth: 1.5
                    });

                    // Grid Lines
                    for(let i=1; i<9; i++) {
                        const thick = i % 3 === 0 ? 1.5 : 0.5;
                        // Vert
                        page.drawLine({
                            start: {x: x + i*cellSize, y: y},
                            end: {x: x + i*cellSize, y: y+size},
                            thickness: thick, color: rgb(0,0,0)
                        });
                        // Horiz
                        page.drawLine({
                            start: {x: x, y: y + i*cellSize},
                            end: {x: x + size, y: y + i*cellSize},
                            thickness: thick, color: rgb(0,0,0)
                        });
                    }

                    // Numbers
                    for(let r=0; r<9; r++) {
                        for(let c=0; c<9; c++) {
                            const val = data[(8-r)*9 + c]; // PDF coords are bottom-up
                            if(val !== 0) {
                                const text = val.toString();
                                const txtSize = cellSize * 0.6;
                                const width = helveticaBold.widthOfTextAtSize(text, txtSize);
                                page.drawText(text, {
                                    x: x + c*cellSize + (cellSize-width)/2,
                                    y: y + r*cellSize + (cellSize-txtSize)/2 + 2,
                                    size: txtSize,
                                    font: isSolution ? helvetica : helveticaBold,
                                    color: isSolution ? rgb(0.4,0.4,0.4) : rgb(0,0,0)
                                });
                            }
                        }
                    }

                    // Label
                    page.drawText(`${isSolution ? 'Answer' : 'Puzzle'} #${index+1}`, {
                        x: x, y: y + size + 5,
                        size: 8, font: helveticaBold
                    });
                };

                // --- Layout Engine (Simplified for Demo) ---
                // Calculates a grid layout (e.g. 2x2, 2x3) based on count
                let cols = 2;
                let rows = 3;
                if(puzzlesPerPage === 1) { cols=1; rows=1; }
                if(puzzlesPerPage === 2) { cols=1; rows=2; }
                if(puzzlesPerPage === 4) { cols=2; rows=2; }
                if(puzzlesPerPage === 6) { cols=2; rows=3; } // Auto fallback

                const contentW = pageW - (margin*2);
                const contentH = pageH - (margin*2) - (showHeader ? 60 : 0);
                
                const gap = 30;
                const gridW = (contentW - (gap * (cols-1))) / cols;
                const gridH = (contentH - (gap * (rows-1))) / rows;
                const size = Math.min(gridW, gridH);

                // --- Generate Puzzle Pages ---
                let currentPage;
                for(let i=0; i<puzzles.length; i++) {
                    if(i % puzzlesPerPage === 0) {
                        currentPage = pdfDoc.addPage([pageW, pageH]);
                        if(showHeader) {
                            currentPage.drawText("Sudoku Worksheet", { x: margin, y: pageH - 50, size: 18, font: helveticaBold });
                            currentPage.drawText(`Name: __________________   Date: ________`, { x: pageW - margin - 250, y: pageH - 50, size: 10, font: helvetica });
                        }
                    }

                    const idxOnPage = i % puzzlesPerPage;
                    const c = idxOnPage % cols;
                    const r = Math.floor(idxOnPage / cols);
                    
                    const x = margin + c * (size + gap);
                    const y = pageH - margin - (showHeader?60:0) - size - (r * (size + gap));

                    drawSudoku(currentPage, x, y, size, puzzles[i].puzzle, false, i);
                }

                // --- Generate Answer Pages ---
                if($('#answerKey').checked) {
                     for(let i=0; i<puzzles.length; i++) {
                        if(i % puzzlesPerPage === 0) {
                            currentPage = pdfDoc.addPage([pageW, pageH]);
                            currentPage.drawText("Answer Key", { x: margin, y: pageH - 50, size: 16, font: helveticaBold });
                        }
                        const idxOnPage = i % puzzlesPerPage;
                        const c = idxOnPage % cols;
                        const r = Math.floor(idxOnPage / cols);
                        const x = margin + c * (size + gap);
                        const y = pageH - margin - (showHeader?60:0) - size - (r * (size + gap));
                        drawSudoku(currentPage, x, y, size, puzzles[i].solution, true, i);
                    }
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Sudoku_Set_${Date.now()}.pdf`;
                link.click();
                
                toast('PDF Downloaded Successfully');

            } catch (err) {
                console.error(err);
                alert('Error generating PDF: ' + err.message);
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        });

        // 6. Share Logic (Native + Copy Fallback)
        $('#shareBtn').addEventListener('click', async () => {
            const shareData = {
                title: 'Sudoku Architect',
                text: 'Create free vector Sudoku worksheets!',
                url: window.location.href
            };

            if (navigator.share) {
                try { await navigator.share(shareData); } catch (err) {}
            } else {
                navigator.clipboard.writeText(window.location.href);
                toast('Link copied to clipboard');
            }
        });

    </script>
</body>
</html>
